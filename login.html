<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RideXpress Login</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1d2671,#c33764);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

form{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    width:300px;
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:20px;
    background:linear-gradient(45deg,#ff512f,#dd2476);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<form action="login.php" method="POST">

<h2>Login</h2>

<input type="email" name="email" placeholder="Email" required>

<button type="submit">Login</button>

</form>
